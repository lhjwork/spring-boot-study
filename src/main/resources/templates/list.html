<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="/main.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{nav.html :: navbar}"></div>

<div class="card-grid">
    <div class="card" th:each="item : ${items}">
        <a th:href="@{/items/{id}(id=${item.id})}">
            <img src="https://placehold.co/300">
            <h4 th:text="${item.title}">바지</h4>
            <p class="price" th:text="'₩' + ${item.price}">₩7억</p>
        </a>
    </div>
</div>

</body>
</html>
